# SPA serving: serve static assets, fall back to index.html for client routes.
server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /healthz {
    return 200 "ok";
    add_header Content-Type text/plain;
  }
}
